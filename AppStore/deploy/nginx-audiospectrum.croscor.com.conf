# audiospectrum.croscor.com — static landing for Audio Spectrum Pro
# Server 1 (194.31.52.56): /etc/nginx/conf.d/audiospectrum.croscor.com.conf
# Mirrors the proven imba/yurtec.croscor.com pattern (specific-IP listen so the
# vhost lands in the right nginx listen-group and Host routing is unambiguous).

server {
    listen 194.31.52.56:443 ssl;
    listen [2a02:4780:c:56be::1]:443 ssl;
    server_name audiospectrum.croscor.com;

    root /var/www/audiospectrum.croscor.com/public;
    index index.html;

    access_log /var/log/nginx/audiospectrum.croscor.com.access.log;
    error_log  /var/log/nginx/audiospectrum.croscor.com.error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|woff2?|css|js)$ {
        expires 7d;
        access_log off;
    }

    location = /favicon.ico { return 204; access_log off; }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;

    ssl_certificate /etc/letsencrypt/live/audiospectrum.croscor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/audiospectrum.croscor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 194.31.52.56:80;
    listen [2a02:4780:c:56be::1]:80;
    server_name audiospectrum.croscor.com;

    # serve ACME renewals over HTTP directly (don't depend on the https vhost)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/audiospectrum.croscor.com/public;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}
